# Karta deploy manifest for the karta.sh support agent.
# `entry_point` is the module:attribute exposing the Karta instance.
#
# Note: the platform's buildpacks are currently "python" and "node" only - a
# pure CLAUDE.md ("claude-code") buildpack that deploys a harness folder with no
# wrapper is not yet supported (RFC 0020 OQ5/D9). So this agent ships the same thin
# Python wrapper (app.py) the support-bot demo uses; its behavior still lives
# entirely in CLAUDE.md.
entry_point = "app:app"
buildpack = "python"
name = "karta"
deploy = true
