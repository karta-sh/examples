# SRE incident-investigator example: greps a large log and calls custom MCP
# tools to find the root cause of a production incident.
# Docs: https://docs.karta.sh/build/karta-toml

name = "sre-incident-agent"
deploy = true

[harness]
type = "claude-code"

# The custom tools are a zero-dependency MCP server (tools/sre_tools.py) that
# Karta's Claude harness loads from .mcp.json — no build step, no setup script,
# and no packages to install (it uses only the Python standard library).

# --- Environment (declare-or-bind, RFC 0013) ------------------------------
# This example needs no secrets or external services.
[env]
