name = "artifact-02-generated-report"
deploy = true

[harness]
type = "codex-cli"

[artifacts]
manifest = ".karta/artifacts.json"

[artifacts.kinds.generated-report]
renderer = "builtin.markdown"
schema_version = 1
portability = "static"
allowed_render_paths = ["output/launch-report/**"]
allowed_evidence_paths = ["working/report-sources/**"]
allowed_provenance_paths = []
allowed_continuation_paths = []
max_share_bytes = 100000
